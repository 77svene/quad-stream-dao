<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStream | Real-Time QF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <nav class="border-b border-slate-800 p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                QuadStream
            </h1>
            <div id="wallet-status" class="flex items-center gap-4">
                <button onclick="init()" id="connectBtn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-medium transition-all">
                    Connect Wallet
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <header class="mb-12">
            <h2 class="text-4xl font-extrabold mb-2">Matching Pool</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <p class="text-slate-400 text-sm uppercase tracking-wider">Total Matching Rate</p>
                    <p id="totalMatchingRate" class="text-3xl font-mono mt-1">0.00 <span class="text-sm text-slate-500">DAI/sec</span></p>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <p class="text-slate-400 text-sm uppercase tracking-wider">Active Projects</p>
                    <p id="projectCount" class="text-3xl font-mono mt-1">0</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <p class="text-slate-400 text-sm uppercase tracking-wider">Network Weight</p>
                    <p id="totalWeight" class="text-3xl font-mono mt-1">0.00</p>
                </div>
            </div>
        </header>

        <section>
            <div class="flex justify-between items-end mb-6">
                <h3 class="text-2xl font-bold">Project Leaderboard</h3>
                <button onclick="refreshData()" class="text-sm text-blue-400 hover:text-blue-300">Refresh Data</button>
            </div>
            
            <div id="project-list" class="grid gap-4">
                <!-- Projects injected here -->
                <div class="animate-pulse bg-slate-800 h-32 rounded-2xl"></div>
                <div class="animate-pulse bg-slate-800 h-32 rounded-2xl"></div>
            </div>
        </section>
    </main>

    <!-- Modal for contributing -->
    <div id="streamModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-3xl max-w-md w-full">
            <h3 class="text-2xl font-bold mb-4">Start Stream</h3>
            <p class="text-slate-400 mb-6">Set your contribution rate. This will be streamed continuously until you stop it.</p>
            <input type="number" id="streamRateInput" step="0.000001" placeholder="0.01 DAI/sec" 
                   class="w-full bg-slate-900 border border-slate-600 rounded-xl p-4 mb-6 text-xl focus:outline-none focus:border-blue-500">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 px-6 py-3 rounded-xl border border-slate-600 hover:bg-slate-700 transition-colors">Cancel</button>
                <button id="confirmStreamBtn" class="flex-1 px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 font-bold transition-colors">Confirm</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let activeProject = null;

        function openStreamModal(projectAddr) {
            activeProject = projectAddr;
            document.getElementById('streamModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('streamModal').classList.add('hidden');
            activeProject = null;
        }

        document.getElementById('confirmStreamBtn').onclick = async () => {
            const rate = document.getElementById('streamRateInput').value;
            if (!rate || !activeProject) return;
            
            try {
                const tx = await updateContribution(activeProject, rate);
                console.log("TX Sent:", tx.hash);
                closeModal();
                await tx.wait();
                refreshData();
            } catch (err) {
                alert("Transaction failed: " + err.message);
            }
        };

        // Auto-refresh every 10 seconds
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
